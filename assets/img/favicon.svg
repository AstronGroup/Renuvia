    <!-- outer side petals (shorter) -->
    <path d="M96,134 C88,116 88,92 96,74 C104,92 104,116 96,134 Z" transform="rotate(52 96 134)"/>
    <path d="M96,134 C88,116 88,92 96,74 C104,92 104,116 96,134 Z" transform="rotate(-52 96 134)"/>
    <!-- base leaves -->
    <path d="M96,136 C86,128 86,116 92,108 C100,114 100,128 96,136 Z" transform="rotate(74 96 136)"/>
    <path d="M96,136 C86,128 86,116 92,108 C100,114 100,128 96,136 Z" transform="rotate(-74 96 136)"/>
