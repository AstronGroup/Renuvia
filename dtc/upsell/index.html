<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>One more thing before you go — Renuvia</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="../../assets/img/favicon.svg">

  <!-- ==========================================================================
       CARTPANDA — EXTERNAL UPSELL SCRIPT
       Cole aqui o script de "External Upsell" gerado no SEU painel da Cartpanda.
       (Painel > Upsell > External Upsell). Sem ele, o one-click NÃO funciona,
       e o script precisa estar em TODAS as páginas do funil de upsell.
       -------------------------------------------------------------------------- -->
  <!-- <script src="https://.../cartpanda-external-upsell.js"></script> -->
  <!-- ========================================================================== -->
            <script src="https://assets.mycartpanda.com/cartx-ecomm-ui-assets/js/libs/ocu-external.js"> </script>
            <script> new OcuExternal(); </script>
          
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --ink: #2C3A24;
      --ink-2: #47583A;
      --gold: #8C6D2A;
      --paper: #FAF8F3;
      --line: #e3ddd0;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      background: var(--paper);
      color: var(--ink);
      font: 16px/1.6 "Inter", system-ui, sans-serif;
    }

    .card {
      width: 100%;
      max-width: 500px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 16px 44px rgba(44, 58, 36, .10);
    }

    .card__media {
      background: linear-gradient(160deg, #f4efe4, #ece3d1);
      padding: 28px;
      text-align: center;
    }

    .card__media img {
      width: 190px;
      max-width: 60%;
      height: auto;
    }

    .card__body { padding: 32px; text-align: center; }

    .eyebrow {
      font-size: 12px;
      letter-spacing: .14em;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--gold);
      margin: 0 0 12px;
    }

    h1 {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 600;
      font-size: 28px;
      line-height: 1.2;
      margin: 0 0 12px;
    }

    h1 em { font-style: italic; color: var(--gold); }

    .lede { margin: 0 0 20px; color: var(--ink-2); }

    .price {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 10px;
      margin: 0 0 24px;
    }

    .price .now { font-family: "Fraunces", serif; font-size: 34px; font-weight: 600; }
    .price .was { color: #9a9384; text-decoration: line-through; font-size: 18px; }
    .price .off {
      background: var(--gold);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 999px;
    }

    /* ACCEPT = compra one-click */
    .btn-accept {
      display: block;
      width: 100%;
      padding: 18px;
      border: 0;
      border-radius: 14px;
      background: var(--ink);
      color: var(--paper);
      font-family: "Inter", sans-serif;
      font-size: 17px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: background .15s ease, transform .08s ease;
    }

    .btn-accept:hover { background: var(--ink-2); }
    .btn-accept:active { transform: scale(.99); }

    /* DECLINE = recusa a oferta e segue o funil */
    .btn-decline {
      display: inline-block;
      margin-top: 16px;
      background: none;
      border: 0;
      color: #9a9384;
      font-size: 14px;
      text-decoration: underline;
      cursor: pointer;
    }

    .btn-decline:hover { color: var(--ink-2); }

    .reassure {
      margin: 18px 0 0;
      font-size: 12px;
      color: #9a9384;
    }
  </style>
</head>

<body>

  <main class="card">
    <div class="card__media">
      <!-- Troque pela imagem da oferta de upsell -->
      <img src="../../assets/img/img-02-697f4291.webp" alt="Renuvia Collagen Complex">
    </div>

    <div class="card__body">
      <p class="eyebrow">Wait — one-time offer</p>
      <h1>Add a second jar at <em>half price</em></h1>
      <p class="lede">No need to enter your card again. One click adds it to the order you just placed.</p>

      <div class="price">
        <span class="now">$29.99</span>
        <span class="was">$59.99</span>
        <span class="off">50% OFF</span>
      </div>

      <!-- ==========================================================================
           ACCEPT — botão de compra ONE-CLICK.
           Troque o href pelo LINK DE ACEITE que a Cartpanda gerou pra esta oferta.
           (É um <a>; o script externo da Cartpanda cuida do restante.)
           -------------------------------------------------------------------------- -->
      <a class="btn-accept" href="https://astrongroup.mycartpanda.com/ex-ocu/next-offer/ym21xGPjpD?accepted=yes">
        Yes, add it to my order — $29.99
      </a>

      <!-- ==========================================================================
           DECLINE — recusa e segue o funil (próxima oferta ou thank-you page).
           Troque o href pelo LINK DE RECUSA que a Cartpanda gerou.
           -------------------------------------------------------------------------- -->
      <a class="btn-decline" href="https://astrongroup.mycartpanda.com/ex-ocu/next-offer/ym21xGPjpD?accepted=no">
        No thanks, I'll pass on this deal
      </a>

      <p class="reassure">Charged to the card you just used &middot; Secure checkout by Cartpanda</p>
    </div>
  </main>

</body>

</html>
